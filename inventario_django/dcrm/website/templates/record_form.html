{% extends 'base.html' %}

{% block content %}
<style>
  body {
    background: #FFB6C1;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
  }

  .form-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 16px;
  }

  .form-panel {
    background: #fff;
    border-radius: 8px;
    padding: 28px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  }

  .form-title {
    color: #d94d73;
    font-weight: 700;
  }

  .btn-pink {
    background: #FF80A2;
    border-color: #FF80A2;
    color: #fff;
  }

  .btn-pink:hover {
    background: #ef6f92;
    border-color: #ef6f92;
    color: #fff;
  }
</style>

<div class="form-wrap">
  <div class="form-panel">
    <h1 class="form-title h3 text-center mb-4">{{ title }}</h1>

    <form method="POST">
      {% csrf_token %}

      {% if form.errors %}
        <div class="alert alert-danger">Revise los datos ingresados.</div>
      {% endif %}

      <div class="row g-3">
        {% for field in form %}
          <div class="col-md-6">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
              <div class="text-danger small">{{ error }}</div>
            {% endfor %}
          </div>
        {% endfor %}
      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-pink">Guardar</button>
        <a href="{% url 'home' %}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
