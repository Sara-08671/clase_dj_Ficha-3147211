{% extends 'base.html' %}
{% block content %}
<style>
  body{
    background:#FFB6C1;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .login-wrap{
    max-width:400px;
    margin:60px auto;
    padding:20px;
  }

  .login-panel{
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
  }

  .login-title{
    color:#d94d73;
    font-size:28px;
    font-weight:700;
    margin-bottom:25px;
    text-align:center;
  }

  .btn-pink{
    width:100%;
    height:42px;
    margin-top:25px;
    background:#FF80A2;
    border:none;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
  }

  .btn-pink:hover{
    background:#ef6f92;
  }

  .campo{
    margin-bottom:20px;
  }

  .campo label{
    display:block;
    font-weight:600;
    color:#444;
    margin-bottom:6px;
  }

  .campo input{
    width:100%;
    height:40px;
    padding:8px 12px;
    box-sizing:border-box;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:14px;
  }

  .campo input:focus{
    outline:none;
    border-color:#FF80A2;
  }
</style>

<div class="login-wrap">
<div class="login-panel">

<h1 class="login-title">
Iniciar sesión
</h1>

<form method="POST" action="{% url 'login' %}">
{% csrf_token %}

{% if messages %}
{% for message in messages %}
<div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
{{ message }}
<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
</div>
{% endfor %}
{% endif %}

<div class="campo">
<label for="email">Correo electrónico</label>
<input type="email" id="email" class="form-control" name="email" placeholder="Correo electrónico" required>
</div>

<div class="campo">
<label for="password">Contraseña</label>
<input type="password" id="password" class="form-control" name="password" placeholder="Contraseña" required>
</div>

<button type="submit" class="btn-pink">Ingresar</button>


</form>

<div class="text-center mt-4">
<span>
No tienes cuenta?
</span>
<a href="{% url 'register' %}">
Crear cuenta
</a>
</div>

</div>
</div>

{% endblock %}
