{% extends 'base.html' %}
{% block content %}
<style>
  :root { --primary: #FF80A2; --secondary: #d94d73; --success: #28a745; --danger: #dc3545; --info: #17a2b8; }
  body { background: var(--primary); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  .login-wrap { max-width: 400px; margin: 60px auto; padding: 20px; }
  .login-panel { background: white; padding: 35px; border-radius: 18px; box-shadow: 0 8px 20px rgba(0,0,0,.15); }
  .login-title { color: var(--secondary); font-size: 28px; font-weight: 700; margin-bottom: 25px; text-align: center; }
  .btn-pink { width: 100%; height: 42px; margin-top: 25px; background: var(--primary); border: none; color: white; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: 600; }
  .btn-pink:hover { background: #ef6f92; }
  .campo { margin-bottom: 20px; }
  .campo label { display: block; font-weight: 600; color: #444; margin-bottom: 6px; }
  .campo input { width: 100%; height: 40px; padding: 8px 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; }
  .campo input:focus { outline: none; border-color: var(--primary); }
  .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px 16px; border-radius: 12px; margin-bottom: 15px; }
  .alert-danger { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px 16px; border-radius: 12px; margin-bottom: 15px; }
</style>

<div class="login-wrap">
  <div class="login-panel">
    <h1 class="login-title">Iniciar Sesión</h1>

    <!-- Alertas visuales mejoradas -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      <div class="campo">
        <label for="email">Usuario o correo electrónico</label>
        <input type="text" id="email" name="email" placeholder="Usuario o correo" required autocomplete="username">
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Contraseña" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-pink">Ingresar</button>
    </form>

    <div class="text-center mt-4">
      <span>No tienes cuenta?</span>
      <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 600;">Crear cuenta</a>
    </div>
  </div>
</div>
{% endblock %}
