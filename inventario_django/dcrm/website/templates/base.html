{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Django CRM</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/custom-pink.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99MVMD4TYiVkVXUEVkVVwWvLZlXsbwLBk7e1RHL9n7eoZ0E4b0X9qY7TpdF" crossorigin="anonymous"></script>
  </head>
  <body>
    {% include 'navbar.html' %}
    <div id="main-content" class="{% block container_class %}container{% endblock %}">
      {% block content %}
      {% endblock %}
    </div>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script>
      document.body.addEventListener('htmx:configRequest', (event) => {
        event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
      });
    </script>
  </body>
</html>
