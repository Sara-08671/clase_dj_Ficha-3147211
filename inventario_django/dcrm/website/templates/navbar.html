<style>
  .navbar-main {
    background: #ffffff;
    border-bottom: 2px solid #FFB6C1;
    padding: 1rem 2rem;
    box-shadow: 0 4px 20px rgba(255, 182, 193, 0.15);
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
  }

  .navbar-brand {
    color: #FF80A2 !important;
    font-weight: 800;
  }

  .navbar-brand1 {
    color: #FF80A2 !important;
    font-weight: 300;
    margin-right: 2100px;
  }

  .nav-link {
    color: #FF9AA2 !important;
    font-weight: 600;
  }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,182,193,0.2);
    padding: 5px 15px;
    border-radius: 50px;
  }

  .btn-logout-nav {
    margin-left: 10px;
    border: 1px solid #ff8888;
    background: transparent;
    color: #ff8888;
    border-radius: 50px;
    padding: 5px 12px;
  }

  .welcome-text {
    color: #FF80A2;
    font-weight: 600;
    margin-right: 15px;
  }
</style>

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-main">
  <div class="container-fluid">

    <a class="navbar-brand" href="{% url 'home' %}">
      🌟 Menu
    </a>

    <div class="d-flex align-items-center">
      <div class="user-badge">
        👨‍🚀 {{ user.username }}
      </div>

      <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="btn-logout-nav">Cerrar sesion</button>
      </form>
    </div>
  </nav>
{% endif %}
