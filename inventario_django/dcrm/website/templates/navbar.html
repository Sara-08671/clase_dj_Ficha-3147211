{% if user.is_authenticated %}
<nav style="background: #4a90d9; padding: 10px 20px; color: white;">
  <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
    <a href="{% url 'home' %}" style="color: white; text-decoration: none; font-weight: bold;">Menu</a>
    <span>Usuario: {{ user.username }}</span>
    <form method="POST" action="{% url 'logout' %}" style="display: inline;">
      {% csrf_token %}
      <button type="submit" style="background: #dc3545; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer;">Cerrar sesión</button>
    </form>
  </div>
</nav>
{% endif %}
